name: Build TizenBrew Installer and Release

on:
  push:
    branches:
      - new
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '.github/**'
      - 'README.md'
  pull_request:
    branches:
      - new
    paths-ignore:
      - '.github/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version/tag name (e.g. v1.1.35)'
        required: false
      publish_release:
        description: 'Publish a GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone repo with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tags (safety)
        run: |
          git fetch --tags --force --prune

      # ── Bump version + push tag on branch push ───────────────────────────
      - name: Bump version and push tag
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: |
          CURRENT=$(grep '<widget' client/config.xml | grep -oP '(?<=version=")[^"]+')
          echo "Current version: $CURRENT"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New version: $NEW_VERSION"
          echo "RELEASE_VERSION=v${NEW_VERSION}" >> $GITHUB_ENV

          sed -i "/<widget/s/version=\"${CURRENT}\"/version=\"${NEW_VERSION}\"/" client/config.xml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add client/config.xml
          git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push origin HEAD:new

          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      # ── On tag push, derive version from the tag ─────────────────────────
      - name: Set version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_VERSION="${GITHUB_REF#refs/tags/}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      # ── On manual dispatch ───────────────────────────────────────────────
      - name: Set version from manual input
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          else
            CURRENT=$(grep '<widget' client/config.xml | grep -oP '(?<=version=")[^"]+')
            RELEASE_VERSION="v${CURRENT}"
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Determine release tag
        if: env.RELEASE_VERSION == ''
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            if [ -f client/config.xml ]; then
              CFG_VER=$(sed -n 's/.*version="\([^"]*\)".*/\1/p' client/config.xml | head -n1)
              TAG=${CFG_VER:+v$CFG_VER}
              TAG=${TAG:-v0.0.0-${GITHUB_SHA:0:7}}
            else
              TAG=v0.0.0-${GITHUB_SHA:0:7}
            fi
          fi
          echo "RELEASE_VERSION=$TAG" >> $GITHUB_ENV

      - name: Determine source branch for release notes
        run: |
          BRANCH=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin --contains "$GITHUB_SHA" | sed 's#^origin/##' | grep -v '^HEAD$' | head -n1)
          if [ -z "$BRANCH" ]; then
            BRANCH="unknown (tag build)"
          fi
          echo "SOURCE_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Determine app metadata for release notes
        run: |
          APP_ID=$(sed -n 's/.*<tizen:application[^>]*id="\([^"]*\)".*/\1/p' client/config.xml | head -n1)
          APP_NAME=$(echo "$APP_ID" | sed -n 's/^[^.]*\.\(.*\)$/\1/p')
          if [ -z "$APP_ID" ]; then APP_ID="unknown"; fi
          if [ -z "$APP_NAME" ]; then APP_NAME="unknown"; fi
          echo "APP_ID=$APP_ID" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Install ldid (required system tool)
        uses: MOZGIII/install-ldid-action@v1
        with:
          tag: v2.1.5-procursus7

      - name: Install modules, transpile service and build service
        working-directory: client/services/tizenbrew-installer-service
        run: |
          sudo apt update
          sudo apt install -y expect zip coreutils
          npm install
          npm install -g @vercel/ncc wgt-to-usb https://github.com/reisxd/tizen.js/tarball/main @yao-pkg/pkg
          npm run build
          rm -rf node_modules
          rm -rf transpiled

      - name: Build UI
        working-directory: client/ui
        run: |
          npm install --force
          npm run build
          rm -rf node_modules

      - name: Prepare Tizen Certificate
        run: |
          echo "${{ secrets.TIZEN_AUTHOR_KEY }}" | base64 -d > "${GITHUB_WORKSPACE}/tizenbrew-author.p12"

      - name: Build TizenBrew
        working-directory: client
        run: |
          mkdir release
          tizenjs build . -t wgt -o release/TizenBrewInstaller.wgt --author "${GITHUB_WORKSPACE}/tizenbrew-author.p12" --authorPwd '${{ secrets.TIZEN_AUTHOR_KEY_PW }}' -p public --ignore node_modules,/.*\.wgt$/,/userwidget/,/release/

      - name: Upload TizenBrew package artifact for Old Tizen
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.sha }}-old.wgt
          path: client/release/TizenBrewInstaller.wgt

      - name: Release TizenBrew Build Results
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          body: |
            Built from branch: `${{ env.SOURCE_BRANCH }}`
            Commit: `${{ github.sha }}`
            TBI_METADATA: {"appId":"${{ env.APP_ID }}","appName":"${{ env.APP_NAME }}"}
          files: |
            client/release/*

      - name: Build Installer Desktop
        working-directory: client
        run: |
          pkg -C GZip . --no-bytecode --public

      - name: Release Installer Desktop
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          body: |
            Built from branch: `${{ env.SOURCE_BRANCH }}`
            Commit: `${{ github.sha }}`
            TBI_METADATA: {"appId":"${{ env.APP_ID }}","appName":"${{ env.APP_NAME }}"}
          files: |
            client/dist/*